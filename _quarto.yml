project:
  type: website
  output-dir: docs
  render:
    - "*.qmd"
  resources:
    - assets/charts/*.csv
    - oer/**

website:
  title: "EUR_DATA"
  description: "Open data, code, and educational resources on European political institutions."
  site-url: "https://connected-politics-lab.github.io/EUR_DATA/"
  repo-url: "https://github.com/Connected-Politics-Lab/EUR_DATA"
  page-footer:
    left: "Co-funded by the European Union (Erasmus+ Jean Monnet, grant 101127178)."
    right: "Maintained by the [Connected Politics Lab](https://github.com/Connected-Politics-Lab)."
  navbar:
    left:
      - href: index.qmd
        text: Home
      - href: data.qmd
        text: Data
      - href: oer.qmd
        text: Teaching
      - href: about.qmd
        text: About
    right:
      - icon: github
        href: https://github.com/Connected-Politics-Lab/EUR_DATA

format:
  html:
    theme: cosmo
    css: styles.css
    toc: true
